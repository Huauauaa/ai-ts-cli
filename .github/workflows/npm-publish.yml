name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync package version with tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name || github.ref_name }}"
          VERSION="${TAG_NAME#v}"

          if [ -z "$TAG_NAME" ] || [ -z "$VERSION" ]; then
            echo "Unable to resolve tag name from workflow context."
            exit 1
          fi

          if [ "$TAG_NAME" = "$VERSION" ]; then
            echo "Tag must start with 'v', got: $TAG_NAME"
            exit 1
          fi

          node -e "const fs=require('fs'); const p='package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+'\n');" "$VERSION"
          echo "Using package version: $VERSION (from tag: $TAG_NAME)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Publish to npm with token
        if: ${{ env.NPM_TOKEN != '' }}
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Publish to npm with trusted publishing
        if: ${{ env.NPM_TOKEN == '' }}
        run: pnpm publish --access public --no-git-checks
